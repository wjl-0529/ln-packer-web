name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Dart dependencies
        run: dart pub get

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Test Dart web backend
        run: dart test test/web

      - name: Build Web UI
        working-directory: web
        run: npm run build

      - name: Compile server
        run: dart compile exe bin/server.dart -o build/server
