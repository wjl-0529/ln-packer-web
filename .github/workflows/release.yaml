name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Dart dependencies
        run: dart pub get

      - name: Install Web dependencies
        working-directory: web
        env:
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_FETCH_RETRIES: "5"
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
          NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit --no-fund && exit 0
            echo "npm ci failed on attempt ${attempt}; retrying in $((attempt * 10)) seconds..."
            sleep $((attempt * 10))
          done
          npm ci --prefer-offline --no-audit --no-fund

      - name: Test Dart web backend
        run: dart test test/web

      - name: Build Web UI
        working-directory: web
        run: npm run build

      - name: Compile server
        run: dart compile exe bin/server.dart -o build/server
