name: bili-novel-ui-packer

services:
  bili-novel-ui-packer:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        DART_IMAGE: ${DART_IMAGE:-dart:stable}
        DEBIAN_IMAGE: ${DEBIAN_IMAGE:-debian:bookworm-slim}
        APT_MIRROR: ${APT_MIRROR:-}
    container_name: bili-novel-ui-packer
    restart: unless-stopped
    ports:
      - "${PACKER_PORT:-8080}:8080"
    environment:
      PACKER_HOST: 0.0.0.0
      PACKER_PORT: 8080
      PACKER_DATA_DIR: /app/data
      PACKER_PUBLIC_DIR: /app/public
      PACKER_MAX_CONCURRENT: ${PACKER_MAX_CONCURRENT:-1}
      PACKER_CHAPTER_CONCURRENCY: ${PACKER_CHAPTER_CONCURRENCY:-6}
      PACKER_IMAGE_CONCURRENCY: ${PACKER_IMAGE_CONCURRENCY:-8}
      PACKER_SOURCE_RATE_MODE: ${PACKER_SOURCE_RATE_MODE:-stable}
      PACKER_FILE_TTL_HOURS: ${PACKER_FILE_TTL_HOURS:-24}
      # Set a shared token before exposing the service.
      PACKER_ACCESS_TOKEN: ${PACKER_ACCESS_TOKEN:-}
    volumes:
      - ./data:/app/data
